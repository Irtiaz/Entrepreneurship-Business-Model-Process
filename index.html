        body {
            font-family: monospace;
            font-size: 16px;
            padding: 30px;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }

        #json-viewer {
            background-color: #252526;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            min-width: 300px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* Container for child elements, hidden by default */
        .children {
            display: none;
            margin-left: 12px;
            border-left: 1px dashed #555;
            padding-left: 8px;
        }

        /* Toggle class to show children */
        .children.expanded {
            display: block;
        }

        /* Expandable nodes (Keys) */
        .expandable {
            cursor: pointer;
            user-select: none;
            padding: 4px 0;
            color: #9cdcfe;
            /* Light blue for keys */
        }

        .expandable:hover {
            color: #fff;
        }

        /* The right-facing arrow for collapsed items */
        .expandable::before {
            content: '▶';
            display: inline-block;
            width: 20px;
            text-align: center;
            color: #888;
            font-size: 12px;
            transition: transform 0.1s;
        }

        /* The down-facing arrow for expanded items */
        .expandable.open::before {
            content: '▼';
        }

        /* Non-expandable items (Values) */
        .leaf {
            padding: 4px 0;
            color: #ce9178;
            /* Orange for string values */
        }

        /* Bullet point for non-expandable items to align with arrows */
        .leaf::before {
            content: '•';
            display: inline-block;
            width: 20px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
    </style>

        /**
         * Helper function to handle the expand/collapse logic
         * It includes the "reset" feature for descendants.
         */
        function toggleNode(e, toggleElement, childrenContainer) {
            e.stopPropagation(); // Prevent triggering parent clicks

            const isExpanded = childrenContainer.classList.contains('expanded');

            if (isExpanded) {
                // Collapse the current node
                childrenContainer.classList.remove('expanded');
                toggleElement.classList.remove('open');

                // FEATURE 1: Find all open descendants and collapse them too
                const expandedDescendants = childrenContainer.querySelectorAll('.expanded');
                const openToggles = childrenContainer.querySelectorAll('.open');

                expandedDescendants.forEach(el => el.classList.remove('expanded'));
                openToggles.forEach(el => el.classList.remove('open'));
            } else {
                // Expand the current node
                childrenContainer.classList.add('expanded');
                toggleElement.classList.add('open');
            }
        }

        /**
         * Recursively builds the DOM tree for the JSON.
         * @param {string|number} key - The current key or array index
         * @param {any} value - The value associated with the key
         * @param {boolean} isArrayIndex - Tells us if the current item is a direct child of an array
         */
        function renderNode(key, value, isArrayIndex) {
            const container = document.createElement('div');

            if (typeof value === 'object' && value !== null) {
                // -- HANDLE OBJECTS & ARRAYS --
                if (isArrayIndex) {
                    // Skip rendering the array index and directly render the object's keys
                    for (let k in value) {
                        container.appendChild(renderNode(k, value[k], Array.isArray(value)));
                    }
                } else {
                    // Render a standard expandable Key
                    const toggle = document.createElement('div');
                    toggle.className = 'expandable';
                    toggle.textContent = key;

                    const children = document.createElement('div');
                    children.className = 'children';

                    // Populate children recursively
                    for (let k in value) {
                        children.appendChild(renderNode(k, value[k], Array.isArray(value)));
                    }

                    // Attach click event for recursive collapse/expand
                    toggle.onclick = (e) => toggleNode(e, toggle, children);

                    container.appendChild(toggle);
                    container.appendChild(children);
                }
            } else {
                // -- HANDLE PRIMITIVE VALUES (Strings, Numbers, etc.) --
                if (isArrayIndex) {
                    // FEATURE 2: Raw array values get the leaf class (which adds the bullet via CSS)
                    container.className = 'leaf';
                    container.textContent = value;
                } else {
                    // Key-value pairs. Key is expandable, Value is the child.
                    const toggle = document.createElement('div');
                    toggle.className = 'expandable';
                    toggle.textContent = key;

                    const children = document.createElement('div');
                    children.className = 'children';

                    const leaf = document.createElement('div');
                    leaf.className = 'leaf';
                    leaf.textContent = value;

                    children.appendChild(leaf);

                    // Attach click event for recursive collapse/expand
                    toggle.onclick = (e) => toggleNode(e, toggle, children);

                    container.appendChild(toggle);
                    container.appendChild(children);
                }
            }

            return container;
        }

        // Initialize the viewer
        const viewer = document.getElementById('json-viewer');
        for (let key in jsonData) {
            // Render root keys (e.g., "array")
            viewer.appendChild(renderNode(key, jsonData[key], false));
        }
